name: build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: '1'
  NUGET_XMLDOC_MODE: skip

jobs:
  verify:
    name: Frontend, .NET and repository verification
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Show toolchain
        run: |
          node --version
          npm --version
          dotnet --info

      - name: Install frontend dependencies
        working-directory: frontend-vue
        run: npm ci --no-audit --no-fund

      - name: Build and verify frontend
        working-directory: frontend-vue
        run: npm run build

      - name: Audit frontend dependencies
        working-directory: frontend-vue
        run: npm audit --audit-level=high

      - name: Restore .NET
        run: dotnet restore PalOpsWeb.slnx

      - name: Build .NET
        run: dotnet build PalOpsWeb.slnx -c Release --no-restore

      - name: Verify catalogs
        run: dotnet run --project tools/PalOps.Tooling -c Release --no-build -- catalog verify --root .

      - name: Verify map definition
        run: dotnet run --project tools/PalOps.Tooling -c Release --no-build -- map verify --root . --allow-missing

      - name: Verify documentation
        run: dotnet run --project tools/PalOps.Tooling -c Release --no-build -- docs verify --root .

      - name: Verify source repository
        run: dotnet run --project tools/PalOps.Tooling -c Release --no-build -- release verify --root .
