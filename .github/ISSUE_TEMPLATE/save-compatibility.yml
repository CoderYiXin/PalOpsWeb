name: Save compatibility issue
description: Report a read-only SAV/GVAS parsing compatibility problem
title: "[Save compatibility] "
labels: [save-format]
body:
  - type: markdown
    attributes:
      value: Never attach an unredacted real Level.sav or player save to a public issue. Arrange private transfer only after a maintainer requests it.
  - type: input
    id: palworld
    attributes:
      label: Palworld server version
    validations:
      required: true
  - type: input
    id: palops
    attributes:
      label: PalOps Web version or commit
    validations:
      required: true
  - type: input
    id: size
    attributes:
      label: Level.sav size
  - type: input
    id: request
    attributes:
      label: Request ID or parse job ID
  - type: textarea
    id: stage
    attributes:
      label: Failing parse stage and sanitized error
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I did not include credentials or an unredacted real save in this public issue.
          required: true
